<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rose For You</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page">
    <section class="hero">
      <h1>Šiandien pagalvojau apie tave...</h1>
      <p>Kartais žinome, ką jaučiame. Tik nerandame tinkamų žodžių.</p>
      <p class="promise">Sukurk vienintelę rožę ir trumpą laišką žmogui, kuris tau svarbus.</p>
    </section>

    <section class="form-card">
      <label>Kam skirta?</label>
      <input id="recipientType" placeholder="pvz. mamai, sesei, draugui" />

      <label>Kaip kreiptis kortelėje?</label>
      <input id="dedication" placeholder="pvz. Sesutei Mildutei" />

      <label>Nuo ko?</label>
      <input id="sender" placeholder="pvz. Jonas" />

      <label>Ką nori pasakyti?</label>
      <textarea id="message" placeholder="pvz. labai tavęs pasiilgau, seniai nesimatėm"></textarea>

      <button id="generateBtn">Generuoti Rose Letter</button>
    </section>

    <section id="preview" class="preview hidden">
      <div class="rose-card">
        <div class="rose-placeholder">🌹</div>
        <p id="letterText"></p>
        <h3 id="dedicationText"></h3>
        <h4 id="senderText"></h4>
        <small>RoseForYou.lt</small>
      </div>

      <div class="actions">
        <button>Patinka</button>
        <button>Perkurti</button>
        <button>Redaguoti laišką</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
