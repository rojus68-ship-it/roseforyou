<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rose For You</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main>
  <section class="hero">
    <div class="hero-image"></div>

    <h1>Šiandien pagalvojau apie tave...</h1>

    <p>
      Kartais žinome, ką jaučiame.<br>
      Tik nerandame tinkamų žodžių.
    </p>

    <p class="sub">
      Sukurk vienintelę rožę ir trumpą laišką žmogui, kuris tau svarbus.
    </p>

    <a href="#create" class="hero-button">Pradėti</a>
  </section>

  <section id="create" class="form-card">
    <h2>Sukurk Rose Letter</h2>

    <input id="dedication" placeholder="Kam? Pvz. Sesutei Mildutei" />
    <input id="sender" placeholder="Nuo ko? Pvz. Jono" />
    <textarea id="message" placeholder="Ką nori pasakyti?"></textarea>

    <button id="generateBtn">Generuoti rožę</button>
  </section>

  <section id="preview" class="preview hidden">
    <h2>Tavo Rose Letter</h2>
    <div class="result-card">
      <div class="rose-symbol">🌹</div>
      <p id="letterText"></p>
      <h3 id="dedicationText"></h3>
      <h4 id="senderText"></h4>
      <small>RoseForYou.lt</small>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
